<!-- grid-3-cards — generic 3-column recessed-card grid. Fills: C{1,2,3}_{TAG,TITLE,BODY}.
     For "if-you-approve" sections, build steps, three-prong recommendations, etc. -->
<div class="grid grid-3">
  <div class="card card--recessed">
    <span class="tag tag--accent">{{C1_TAG}}</span>
    <h3>{{C1_TITLE}}</h3>
    <p class="meta">{{C1_BODY}}</p>
  </div>
  <div class="card card--recessed">
    <span class="tag tag--accent">{{C2_TAG}}</span>
    <h3>{{C2_TITLE}}</h3>
    <p class="meta">{{C2_BODY}}</p>
  </div>
  <div class="card card--recessed">
    <span class="tag tag--accent">{{C3_TAG}}</span>
    <h3>{{C3_TITLE}}</h3>
    <p class="meta">{{C3_BODY}}</p>
  </div>
</div>
